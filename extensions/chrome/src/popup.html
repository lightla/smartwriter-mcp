<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smartwriter MCP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1e293b;
    }

    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { color: #fff; font-weight: 700; font-size: 14px; }
    .gear-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.8); font-size: 15px; padding: 2px;
      line-height: 1;
    }
    .gear-btn:hover { color: #fff; }

    .settings-panel {
      display: none;
      padding: 10px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .settings-label { font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 6px; }

    .server-entry {
      display: flex; align-items: center; gap: 4px;
      padding: 2px 0;
    }
    .entry-port {
      width: 60px; padding: 3px 5px;
      border: 1px solid #e2e8f0; border-radius: 4px;
      background: #f1f5f9; color: #374151;
      font-size: 11px; outline: none;
      cursor: default; flex-shrink: 0;
    }
    .entry-name {
      flex: 1; padding: 3px 5px;
      border: 1px solid #e2e8f0; border-radius: 4px;
      background: #f1f5f9; color: #6b7280;
      font-size: 11px; outline: none;
      cursor: default;
    }
    .server-entry.editing .entry-port,
    .server-entry.editing .entry-name {
      background: #fff; cursor: text;
    }
    .server-entry.editing .entry-port:focus,
    .server-entry.editing .entry-name:focus {
      border-color: #4f46e5;
    }
    .remove-btn {
      background: none; border: none; cursor: pointer;
      color: #94a3b8; font-size: 16px; line-height: 1;
      padding: 0 2px; flex-shrink: 0;
    }
    .remove-btn:hover { color: #ef4444; }

    .add-row { display: flex; gap: 4px; margin-top: 8px; }
    .port-input {
      width: 68px; padding: 5px 6px;
      border: 1px solid #cbd5e1; border-radius: 5px;
      font-size: 12px; outline: none; flex-shrink: 0;
    }
    .port-input:focus { border-color: #4f46e5; }
    .name-input {
      flex: 1; padding: 5px 6px;
      border: 1px solid #cbd5e1; border-radius: 5px;
      font-size: 12px; outline: none;
    }
    .name-input:focus { border-color: #4f46e5; }
    .add-btn {
      padding: 5px 8px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 5px;
      font-size: 11px; font-weight: 600; cursor: pointer;
      flex-shrink: 0;
    }
    .add-btn:hover { background: #4338ca; }

    .section {
      padding: 10px 14px;
      border-bottom: 1px solid #f1f5f9;
    }
    .section:last-child { border-bottom: none; }

    .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; }
    .status-row:last-child { margin-bottom: 0; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #94a3b8; flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }
    .dot.waiting { background: #f59e0b; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-label { font-size: 11px; font-weight: 600; color: #374151; }
    .status-desc { font-size: 10px; color: #6b7280; margin-top: 1px; }

    .empty-hint { font-size: 11px; color: #94a3b8; }

    .tab-title {
      font-size: 11px; color: #6b7280;
      margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tab-title.active { color: #16a34a; }

    .btn {
      width: 100%; padding: 7px;
      border: none; border-radius: 7px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline {
      background: #fff; color: #4f46e5;
      border: 1.5px solid #4f46e5;
      margin-top: 6px;
    }
    .btn-outline:hover { background: #eef2ff; }
    .btn-track {
      background: #f1f5f9; color: #475569;
      border: 1.5px solid #e2e8f0;
      margin-top: 6px;
    }
    .btn-track:hover { background: #e2e8f0; }
    .btn-track.active {
      background: #ecfdf5; color: #16a34a;
      border-color: #86efac;
    }
    .btn-track.active:hover { background: #dcfce7; }
    .tracking-hint {
      font-size: 10px; color: #94a3b8;
      margin-top: 5px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">Smartwriter MCP</span>
    <button class="gear-btn" id="gearBtn" title="Settings">⚙</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-label">MCP Servers</div>
    <div id="serverList"></div>
    <div class="add-row">
      <input class="port-input" id="newPort" type="number" placeholder="Port" min="1024" max="65535" />
      <input class="name-input" id="newName" type="text" placeholder="Name (optional)" />
      <button class="add-btn" id="addServerBtn">Add</button>
    </div>
  </div>

  <div class="section" id="serversSection">
    <div class="empty-hint">Loading...</div>
  </div>

  <div class="section">
    <div class="tab-title" id="tabTitle">Loading...</div>
    <button class="btn btn-primary" id="connectBtn">Connect This Tab</button>
    <button class="btn btn-outline" id="focusBtn" style="display:none">Focus Connected Tab</button>
    <button class="btn btn-track" id="trackingBtn" style="display:none">Enable Tracking</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
