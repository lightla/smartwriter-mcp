<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Smartwriter MCP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto; width: 400px; background: #f8f9fa; color: #333; }
    .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 16px; text-align: center; }
    .header h1 { font-size: 16px; font-weight: 600; }
    .content { padding: 16px; }
    .section { margin-bottom: 20px; }
    .section-title { font-size: 12px; font-weight: 600; color: #666; text-transform: uppercase; margin-bottom: 8px; }
    .status { background: white; border-radius: 6px; padding: 12px; font-size: 12px; margin-bottom: 12px; }
    .status.connected { background: #f0fdf4; border-left: 3px solid #22c55e; color: #166534; }
    .status.disconnected { background: #fef2f2; border-left: 3px solid #ef4444; color: #991b1b; }
    .tabs-list { display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
    .tab-item { background: white; border: 1px solid #ddd; border-radius: 6px; padding: 10px; display: flex; justify-content: space-between; align-items: center; }
    .tab-item:hover { border-color: #667eea; }
    .tab-item.current { background: #f0f4ff; border-color: #667eea; }
    .tab-item-info { flex: 1; min-width: 0; }
    .tab-item-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tab-item-url { font-size: 11px; color: #999; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; }
    .btn { padding: 6px 12px; border: none; border-radius: 4px; font-size: 12px; font-weight: 600; cursor: pointer; margin-left: 8px; }
    .btn-connect { background: #667eea; color: white; }
    .btn-connect:hover { background: #5568d3; }
    .btn-disconnect { background: #f3f4f6; color: #666; }
    .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid #ddd; border-top-color: #667eea; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ws-info { background: #f0f4ff; border: 1px solid #e0e7ff; border-radius: 6px; padding: 8px; margin-bottom: 12px; font-size: 11px; color: #667eea; font-family: monospace; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Smartwriter MCP</h1>
  </div>
  <div class="content">
    <div class="section">
      <div class="status disconnected" id="status">
        <p style="margin: 0; font-weight: 500;">Not connected</p>
      </div>
    </div>
    <div class="ws-info">
      WebSocket: ws://localhost:9223<br />
      Status: <span id="ws-status">Checking...</span>
    </div>
    <div class="section">
      <div class="section-title">Available Tabs</div>
      <div class="tabs-list" id="tabsList">
        <div style="text-align: center; padding: 20px; color: #999;">
          <div class="spinner"></div>
          <p style="margin-top: 8px;">Loading...</p>
        </div>
      </div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
