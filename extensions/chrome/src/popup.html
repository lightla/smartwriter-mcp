<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smartwriter MCP</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #1e293b;
    }

    .header {
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      padding: 12px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header-title { color: #fff; font-weight: 700; font-size: 14px; }
    .gear-btn {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.8); font-size: 15px; padding: 2px;
      line-height: 1;
    }
    .gear-btn:hover { color: #fff; }

    .settings-panel {
      display: none;
      padding: 10px 14px;
      background: #f8fafc;
      border-bottom: 1px solid #e2e8f0;
    }
    .settings-label { font-size: 11px; font-weight: 600; color: #64748b; margin-bottom: 6px; }
    .settings-row { display: flex; gap: 6px; }
    .port-input {
      flex: 1; padding: 5px 8px;
      border: 1px solid #cbd5e1; border-radius: 5px;
      font-size: 12px; outline: none;
    }
    .port-input:focus { border-color: #4f46e5; }
    .save-btn {
      padding: 5px 10px;
      background: #4f46e5; color: #fff;
      border: none; border-radius: 5px;
      font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .save-btn:hover { background: #4338ca; }
    .settings-hint { font-size: 10px; color: #94a3b8; margin-top: 4px; }

    .section {
      padding: 10px 14px;
      border-bottom: 1px solid #f1f5f9;
    }
    .section:last-child { border-bottom: none; }

    .status-row { display: flex; align-items: center; gap: 8px; }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #94a3b8; flex-shrink: 0;
    }
    .dot.connected { background: #22c55e; }
    .dot.waiting { background: #f59e0b; animation: pulse 2s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .status-label { font-size: 11px; font-weight: 600; color: #374151; }
    .status-desc { font-size: 10px; color: #6b7280; margin-top: 1px; }

    .tab-title {
      font-size: 11px; color: #6b7280;
      margin-bottom: 8px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .tab-title.active { color: #16a34a; }

    .btn {
      width: 100%; padding: 7px;
      border: none; border-radius: 7px;
      font-size: 12px; font-weight: 600;
      cursor: pointer; transition: background 0.15s;
    }
    .btn-primary { background: #4f46e5; color: #fff; }
    .btn-primary:hover { background: #4338ca; }
    .btn-danger { background: #ef4444; color: #fff; }
    .btn-danger:hover { background: #dc2626; }
    .btn-outline {
      background: #fff; color: #4f46e5;
      border: 1.5px solid #4f46e5;
      margin-top: 6px;
    }
    .btn-outline:hover { background: #eef2ff; }
  </style>
</head>
<body>
  <div class="header">
    <span class="header-title">Smartwriter MCP</span>
    <button class="gear-btn" id="gearBtn" title="Settings">⚙</button>
  </div>

  <div class="settings-panel" id="settingsPanel">
    <div class="settings-label">WebSocket Port</div>
    <div class="settings-row">
      <input class="port-input" id="portInput" type="number" placeholder="9223" min="1024" max="65535" />
      <button class="save-btn" id="savePortBtn">Save</button>
    </div>
    <div class="settings-hint">Default: 9223. Change if port is occupied, then restart MCP server.</div>
  </div>

  <div class="section">
    <div class="status-row">
      <div class="dot waiting" id="mcpDot"></div>
      <div>
        <div class="status-label">MCP Server</div>
        <div class="status-desc" id="mcpDesc">Checking...</div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="tab-title" id="tabTitle">Loading...</div>
    <button class="btn btn-primary" id="connectBtn">Connect This Tab</button>
    <button class="btn btn-outline" id="focusBtn" style="display:none">Focus Connected Tab</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
